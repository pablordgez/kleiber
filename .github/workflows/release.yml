name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to publish, for example 1.2.3 or v1.2.3
        required: true
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize version
        id: meta
        shell: bash
        run: |
          raw_version="${{ inputs.version }}"
          version="${raw_version#v}"

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like 1.2.3 or 1.2.3-rc.1" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag exists on this commit
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          git fetch --tags --force

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "$TAG")"
            if [ "$tag_sha" != "$TARGET_SHA" ]; then
              echo "Tag $TAG already exists on $tag_sha, expected $TARGET_SHA." >&2
              exit 1
            fi
          else
            git tag "$TAG" "$TARGET_SHA"
            git push origin "$TAG"
          fi

      - name: Create draft GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; reusing it."
            exit 0
          fi

          args=(release create "$TAG" --draft --generate-notes --title "Kleiber $TAG")
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            artifact_name: linux-x64
            build_script: build:linux
          - name: Windows x64
            os: windows-latest
            artifact_name: windows-x64
            build_script: build:win
          - name: macOS x64
            os: macos-13
            artifact_name: macos-x64
            build_script: build:mac:x64
          - name: macOS arm64
            os: macos-14
            artifact_name: macos-arm64
            build_script: build:mac:arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        shell: bash
        run: corepack pnpm install --frozen-lockfile

      - name: Stamp release version
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build distributables
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: corepack pnpm run ${{ matrix.build_script }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            dist/package/*.AppImage
            dist/package/*.deb
            dist/package/*.dmg
            dist/package/*.exe

  publish:
    name: Publish release assets
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          shopt -s nullglob
          files=(release-assets/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          (
            cd release-assets
            sha256sum * > SHA256SUMS.txt
          )

      - name: Upload assets to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release upload "$TAG" release-assets/* --clobber
